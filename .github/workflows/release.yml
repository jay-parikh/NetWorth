# Builds the per-OS release zips when a v* tag is pushed, and attaches them
# to the GitHub Release. Runs the test suite first on all three OSes.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: pytest -q

  build:
    needs: test
    permissions:
      contents: write        # let the release step upload assets
    strategy:
      matrix:
        include:
          - os: windows-latest
            osname: windows
          - os: macos-latest
            osname: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e . pyinstaller
      - run: python -m networth.generate -o Family_Portfolio_Tracker.xlsx
      - run: pyinstaller --distpath dist -y networth-update.spec
        working-directory: packaging
      - name: Stage release folder
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          STAGE="NetWorth-$V-${{ matrix.osname }}"
          mkdir "$STAGE"
          cp Family_Portfolio_Tracker.xlsx "$STAGE/"
          cp packaging/README-enduser.txt "$STAGE/README.txt"
          if [ "${{ matrix.osname }}" = "windows" ]; then
            cp "packaging/dist/Update Portfolio.exe" "$STAGE/"
            7z a "$STAGE.zip" "$STAGE"
          else
            cp packaging/dist/networth-updater "$STAGE/"
            cp "packaging/Update Portfolio.command" "$STAGE/"
            chmod +x "$STAGE/Update Portfolio.command" "$STAGE/networth-updater"
            zip -r "$STAGE.zip" "$STAGE"   # zip preserves the exec bits
          fi
      - name: Pick release notes
        id: notes
        shell: bash
        run: |
          f="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$f" ]; then
            echo "title=$(head -1 "$f" | sed 's/^# //')" >> "$GITHUB_OUTPUT"
            tail -n +2 "$f" > release-body.md
            echo "has=true" >> "$GITHUB_OUTPUT"
          else
            echo "has=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        if: steps.notes.outputs.has == 'true'
        with:
          files: NetWorth-*.zip
          name: ${{ steps.notes.outputs.title }}
          body_path: release-body.md
          prerelease: ${{ contains(github.ref_name, '-') }}
      - uses: softprops/action-gh-release@v2
        if: steps.notes.outputs.has != 'true'
        with:
          files: NetWorth-*.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
